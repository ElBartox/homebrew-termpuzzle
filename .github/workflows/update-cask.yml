name: Update cask on new release

# Mantiene el cask al día con el último release de termpuzzle-releases.
# livecheck solo detecta versiones nuevas; esto de verdad reescribe version+shas.
on:
  schedule:
    - cron: "17 6 * * *" # diario ~06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump cask to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO=ElBartox/termpuzzle-releases

          TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName)
          VERSION=${TAG#v}
          CURRENT=$(grep -m1 -oE 'version "[^"]+"' Casks/termpuzzle.rb | sed -E 's/version "([^"]+)"/\1/')
          echo "latest=$VERSION  current=$CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "El cask ya está en $VERSION; nada que hacer."
            exit 0
          fi

          WORK=$(mktemp -d)
          gh release download "$TAG" --repo "$REPO" --dir "$WORK" \
            --pattern "TermPuzzle-${VERSION}-arm64.dmg" \
            --pattern "TermPuzzle-${VERSION}.dmg"

          ARM_SHA=$(shasum -a 256 "$WORK/TermPuzzle-${VERSION}-arm64.dmg" | awk '{print $1}')
          INTEL_SHA=$(shasum -a 256 "$WORK/TermPuzzle-${VERSION}.dmg" | awk '{print $1}')
          echo "arm64=$ARM_SHA"
          echo "intel=$INTEL_SHA"

          python3 .github/scripts/bump-cask.py "$VERSION" "$ARM_SHA" "$INTEL_SHA"

          if git diff --quiet; then
            echo "Sin cambios en el cask."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/termpuzzle.rb
          git commit -m "cask: TermPuzzle ${VERSION}"
          git push
